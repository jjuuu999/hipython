<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>금융 뉴스 감성 분석기</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h1 { color: #1a73e8; font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; resize: none; box-sizing: border-box; margin-bottom: 1rem; font-size: 1rem; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #1557b0; }
        #resultArea { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; display: none; text-align: center; }
        .label { font-weight: bold; font-size: 1.2rem; }
        .score { color: #666; font-size: 0.9rem; margin-top: 0.5rem; }
        .positive { background-color: #e6f4ea; color: #1e8e3e; }
        .negative { background-color: #fce8e6; color: #d93025; }
        .neutral { background-color: #f8f9fa; color: #3c4043; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 금융 문장 분석기</h1>
        <textarea id="inputText" placeholder="분석할 금융 뉴스나 문장을 입력하세요..."></textarea>
        <button onclick="sendAnalysis()">분석하기</button>

        <div id="resultArea">
            <div id="labelResult" class="label"></div>
            <div id="scoreResult" class="score"></div>
        </div>
    </div>

    <script>
        async function sendAnalysis() {
            const text = document.getElementById('inputText').value;
            const resultArea = document.getElementById('resultArea');
            const labelResult = document.getElementById('labelResult');
            const scoreResult = document.getElementById('scoreResult');

            if (!text.trim()) { alert("문장을 입력해주세요!"); return; }

            try {
                // FastAPI 서버의 /sentiment 엔드포인트로 요청
                const response = await fetch('http://127.0.0.1:8000/sentiment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "text": text })
                });

                const data = await response.json();

                // 결과 화면 업데이트
                resultArea.style.display = 'block';
                labelResult.innerText = `결과: ${data.label}`;
                scoreResult.innerText = `신뢰도: ${(data.score * 100).toFixed(2)}%`;

                // 결과에 따른 색상 변경
                resultArea.className = ''; 
                resultArea.classList.add(data.label.toLowerCase());
            } catch (error) {
                alert("서버가 꺼져있거나 연결할 수 없습니다.");
                console.error(error);
            }
        }
    </script>
</body>
</html>
